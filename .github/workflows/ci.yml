name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure (release preset)
        run: cmake --preset release

      - name: Build gguf_dump
        run: cmake --build build --target gguf_dump -j$(nproc)

      - name: Smoke test
        run: ./build/tools/gguf_dump/gguf_dump
